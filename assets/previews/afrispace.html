<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Afri Space</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#0f766e,#134e4a 50%,#042f2e);min-height:100vh;color:#fff;padding:48px;position:relative}
nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:64px}
.logo{font-weight:800;font-size:1.4rem}
.logo span{color:#5eead4}
.btn{background:#14b8a6;color:#042f2e;padding:10px 20px;border-radius:8px;font-weight:600;font-size:.85rem}
h1{font-size:3.2rem;font-weight:800;line-height:1.1;max-width:640px;margin-bottom:20px}
p{font-size:1.1rem;opacity:.85;max-width:520px;line-height:1.6}
.tags{display:flex;gap:10px;margin-top:32px}
.tags span{background:rgba(255,255,255,.12);padding:8px 14px;border-radius:999px;font-size:.8rem}
.map{position:absolute;right:40px;top:120px;width:480px;height:360px;background:rgba(255,255,255,.08);border-radius:16px;border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:.9rem;opacity:.7}
</style>
</head>
<body>
<nav><div class="logo">Afri<span>Space</span></div><div class="btn">Book a Billboard</div></nav>
<h1>Book your spot.<br>Impact the world.</h1>
<p>Kenya's premier map-based billboard booking platform.</p>
<div class="tags"><span>Leaflet GIS</span><span>M-Pesa</span><span>Live Map</span></div>
<div class="map">Interactive billboard map</div>
</body>
</html>
