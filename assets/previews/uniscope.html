<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UniScope</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:linear-gradient(160deg,#1e3a5f,#0f172a);min-height:100vh;color:#f1f5f9;padding:48px;display:flex;flex-direction:column;align-items:center}
h1{font-size:2rem;font-weight:400;margin-bottom:8px;text-align:center}
.sub{text-align:center;color:#94a3b8;margin-bottom:48px;font-family:system-ui,sans-serif;font-size:.95rem}
.roles{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:900px;width:100%}
.role{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:28px;text-align:center;font-family:system-ui,sans-serif}
.role strong{display:block;font-size:1rem;margin-top:12px}
.role span{font-size:.75rem;color:#94a3b8}
.icon{width:48px;height:48px;margin:0 auto;background:rgba(255,255,255,.15);border-radius:50%}
</style>
</head>
<body>
<h1>Academic Portal Selection</h1>
<p class="sub">UniScope Magazine — choose your role to continue</p>
<div class="roles">
<div class="role"><div class="icon"></div><strong>Student</strong><span>Submit articles</span></div>
<div class="role"><div class="icon"></div><strong>Coordinator</strong><span>Review faculty work</span></div>
<div class="role"><div class="icon"></div><strong>Manager</strong><span>University-wide stats</span></div>
<div class="role"><div class="icon"></div><strong>Administrator</strong><span>System settings</span></div>
<div class="role"><div class="icon"></div><strong>Guest</strong><span>Read selected work</span></div>
<div class="role" style="opacity:.6"><div class="icon"></div><strong>Sign in</strong><span>Secure access</span></div>
</div>
</body>
</html>
